{% extends "layout.html" %}

{% block body %}
<div class="container mt-4">
    <div class="card delete-card shadow-sm mx-auto border">

        <div class="card-body text-center p-4">
            <h4 class="delete-title mb-2">
                Are you sure you want to delete "{{ movie.title }}"?
            </h4>

            <p class="delete-text text-muted mb-4">
                This action cannot be undone.
            </p>

            <form method="POST">
                {% csrf_token %}

                <div class="d-flex justify-content-center">
                    <button type="submit" class="btn btn-danger delete-btn shadow-sm mx-2">
                        Yes, Delete
                    </button>

                    <a href="{% url 'movie_detail' movie.id %}" class="btn btn-secondary cancel-btn mx-2">
                        No, Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .delete-card {
        max-width: 650px;
        border-radius: 15px;
        border-left: 5px solid #d9534f !important;
    }

    .delete-title {
        font-size: 1.5rem;
        font-weight: 700;
        color: #2c3e50;
    }

    .delete-text {
        font-size: 1rem;
    }

    .delete-btn,
    .cancel-btn {
        padding: 8px 25px;
        font-size: 0.95rem;
        border-radius: 8px;
        border: none;
    }

    .delete-btn {
        font-weight: 600;
    }
</style>
{% endblock %}
