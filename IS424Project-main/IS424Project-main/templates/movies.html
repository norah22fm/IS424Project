{% extends "layout.html" %}

{% block body %}
<div class="container mt-1">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="movies-title mb-0">All Movies</h4>
        <a href="{% url 'add_movie' %}" class="btn btn-success add-movie-btn shadow-sm">
            + Add New Movie
        </a>
    </div>

    <div class="table-responsive movies-table-box shadow-sm">
        <table class="table table-hover bg-white mb-0 movies-table">
            <thead class="thead-dark table-head">
                <tr>
                    <th class="col-title">Movie Title</th>
                    <th class="col-genre">Genre</th>
                    <th class="col-year">Year</th>
                    <th class="col-rating text-center">Avg Rating</th>
                    <th class="col-action text-center">Action</th>
                </tr>
            </thead>
            <tbody class="table-body">
                {% for movie in movies %}
                <tr>
                    <td class="movie-name">{{ movie.title }}</td>
                    <td class="movie-genre text-muted">{{ movie.genre }}</td>
                    <td class="movie-year">{{ movie.release_year }}</td>
                    <td class="movie-rating text-center">
                        <span class="star-icon">⭐</span> {{ movie.get_avg_rating }}
                    </td>
                    <td class="text-center">
                        <a href="{% url 'movie_detail' movie.id %}" class="btn btn-info details-btn px-3 shadow-sm">
                            View Details
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<style>
    .movies-title {
        font-size: 1.4rem;
        font-weight: 700;
        color: #2c3e50;
    }

    .add-movie-btn {
        padding: 5px 15px;
        font-size: 0.85rem;
        font-weight: 600;
        color: white;
        border-radius: 8px;
    }

    .movies-table-box {
        border-radius: 12px;
        overflow: hidden;
    }

    .movies-table {
        width: 100%;
        table-layout: fixed;
    }

    .table-head,
    .table-body {
        font-size: 0.9rem;
    }

    .col-title {
        width: 30%;
    }

    .col-genre {
        width: 25%;
    }

    .col-year {
        width: 15%;
    }

    .col-rating,
    .col-action {
        width: 15%;
    }

    .movie-name,
    .movie-genre,
    .movie-year,
    .movie-rating {
        vertical-align: middle !important;
    }

    .movie-name {
        font-weight: 700;
        color: #333;
    }

    .star-icon {
        color: #f1c40f;
    }

    .details-btn {
        font-size: 0.85rem;
        font-weight: 500;
        color: white;
        border: none;
        border-radius: 6px;
    }
</style>
{% endblock %}
