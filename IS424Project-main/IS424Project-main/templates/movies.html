{% extends "layout.html" %}

{% block body %}
<div class="container mt-1">
    
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="font-weight-bold mb-0" style="color: #2c3e50; font-size: 1.4rem;">All Movies</h4>
        <a href="{% url 'add_movie' %}" class="btn btn-success shadow-sm" 
           style="font-size: 0.85rem; padding: 5px 15px; border-radius: 8px; font-weight: 600; color: #fff;">
           + Add New Movie
        </a>
    </div>

    <div class="table-responsive shadow-sm" style="border-radius: 12px; overflow: hidden;">
        <table class="table table-hover bg-white mb-0" style="table-layout: fixed; width: 100%;">
            <thead class="thead-dark" style="font-size: 0.9rem;">
                <tr>
                    <th style="width: 30%;">Movie Title</th>
                    <th style="width: 25%;">Genre</th>
                    <th style="width: 15%;">Year</th>
                    <th class="text-center" style="width: 15%;">Avg Rating</th>
                    <th class="text-center" style="width: 15%;">Action</th>
                </tr>
            </thead>
            <tbody style="font-size: 0.9rem;">
                {% for movie in movies %}
                <tr>
                    <td class="font-weight-bold" style="color: #333; vertical-align: middle;">{{ movie.title }}</td>
                    <td class="text-muted" style="vertical-align: middle;">{{ movie.genre }}</td>
                    <td style="vertical-align: middle;">{{ movie.release_year }}</td>
                    <td class="text-center" style="vertical-align: middle;">
                        <span style="color: #f1c40f;">⭐</span> {{ movie.get_avg_rating }}
                    </td>
                    <td class="text-center" style="vertical-align: middle;">
                        <a href="{% url 'movie_detail' movie.id %}" class="btn btn-info px-3 shadow-sm" 
                           style="font-size: 0.85rem; border-radius: 6px; font-weight: 500; color: #fff; border: none;">
                           View Details
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
