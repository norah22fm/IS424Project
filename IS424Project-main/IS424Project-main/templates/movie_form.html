{% extends "layout.html" %}
{% block body %}

<div class="container mt-1">
    <div class="card movie-form-card shadow-sm p-4 border-0 mx-auto">

        <h5 class="form-title text-center mb-4">{{ title }}</h5>

        <form method="POST">
            {% csrf_token %}

            <div class="form-grid">
                <div class="form-group row mb-3">
                    <label class="col-sm-3 col-form-label form-label">Title:</label>
                    <div class="col-sm-9">{{ form.title }}</div>
                </div>

                <div class="form-group row mb-3">
                    <label class="col-sm-3 col-form-label form-label">Genre:</label>
                    <div class="col-sm-9">{{ form.genre }}</div>
                </div>

                <div class="form-group row mb-3">
                    <label class="col-sm-3 col-form-label form-label">Year:</label>
                    <div class="col-sm-9">{{ form.release_year }}</div>
                </div>

                <div class="form-group row mb-4 align-items-start">
                    <label class="col-sm-3 col-form-label form-label pt-1">Info:</label>
                    <div class="col-sm-9">{{ form.description }}</div>
                </div>
            </div>

            <div class="d-flex justify-content-center mt-2">
                <button type="submit" class="btn btn-primary save-btn shadow-sm mx-1">
                    Save
                </button>

                <a href="{% url 'movies_list' %}" class="btn btn-secondary cancel-btn mx-1">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<style>
    .movie-form-card {
        max-width: 550px;
        border-radius: 12px;
        background-color: white;
    }

    .form-title {
        font-size: 1.4rem;
        font-weight: 700;
        color: #2c3e50;
    }

    .form-label {
        font-size: 1.1rem;
        font-weight: 700;
        color: #333;
    }

    .save-btn,
    .cancel-btn {
        padding: 5px 25px;
        font-size: 0.85rem;
        border-radius: 6px;
        border: none;
    }

    .save-btn {
        font-weight: 600;
        color: white;
    }

    input,
    textarea,
    select {
        width: 100%;
        padding: 8px 12px;
        font-size: 1rem;
        border: 1px solid #ddd;
        border-radius: 8px;
        background-color: #fcfcfc;
    }

    textarea {
        height: 100px;
        resize: none;
    }

    input:focus,
    textarea:focus,
    select:focus {
        border-color: #007bff;
        outline: none;
        box-shadow: 0 0 5px rgba(0, 123, 255, 0.1);
    }
</style>

{% endblock %}
