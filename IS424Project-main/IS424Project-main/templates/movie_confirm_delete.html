{% extends "layout.html" %}

{% block body %}
<div class="container mt-4">
    <div class="card shadow-sm mx-auto border" style="max-width: 650px; border-radius: 15px; border-left: 5px solid #d9534f;">
        
        <div class="card-body text-center p-4">
            
            <h4 class="font-weight-bold mb-2" style="color: #2c3e50; font-size: 1.5rem;">
                Are you sure you want to delete "{{ movie.title }}"?
            </h4>
            
            <p class="text-muted mb-4" style="font-size: 1rem;">
                This action cannot be undone.
            </p>
            
            <form method="POST">
                {% csrf_token %}
                
                <div class="d-flex justify-content-center">
                    <button type="submit" class="btn btn-danger shadow-sm mx-2" 
                            style="font-size: 0.95rem; font-weight: 600; padding: 8px 25px; border-radius: 8px; border: none;">
                        Yes, Delete
                    </button>
                    
                    <a href="{% url 'movie_detail' movie.id %}" class="btn btn-secondary mx-2" 
                       style="font-size: 0.95rem; padding: 8px 25px; border-radius: 8px; border: none;">
                        No, Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
