{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Movie Rental System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    
    <style>
        .welcome-msg { 
            font-size: 1.2rem; 
            color: #4a4a4a; 
            margin-top: 5px; 
            font-weight: 500;
        }
        
        /* التعديل هنا فقط: تنحيف وتضييق البار */
        .nav-container { 
            background: #f8f9fa; 
            padding: 2px 10px; /* جعلناه نحيف جداً */
            border-radius: 50px; 
            max-width: 320px; /* جعلناه ملموم وقصير */
            margin: 0 auto; 
        }

        /* تصغير خط الروابط داخل البار فقط ليتناسب مع نحافته */
        .btn-link { 
            font-weight: 500; 
            text-decoration: none !important; 
            font-size: 1rem; 
            padding: 2px 10px;
        }
        
        hr { margin-top: 10px; margin-bottom: 10px; }
        h2 { margin-top: 5px !important; margin-bottom: 5px !important; }
    </style>
</head>
<body>

    <div class="container text-center mt-1">
        
        <div class="headers"> 
            <img src="{% static 'movie.jpeg' %}" alt="Logo" width="180" height="180" class="rounded-circle shadow-sm">
            
            <h2 class="font-weight-bold" style="font-size: 2.2rem;">Movie Rental System</h2>
            
            {% if user.is_authenticated %}
                <div class="welcome-msg">
                    Welcome back, <span class="text-primary" style="font-size: 1.4rem;">{{ user.username }}</span>!
                </div>
            {% endif %}

            <nav class="mt-2 nav-container shadow-sm border">
                <div class="d-flex justify-content-center align-items-center">
                    <a href="{% url 'movies_list' %}" class="btn btn-link text-dark">Movies List</a>
                    
                    <span class="text-muted mx-1" style="font-size: 1.2rem;">|</span>

                    {% if user.is_authenticated %}
                        <a href="{% url 'logout' %}" class="btn btn-link text-danger">Logout</a>
                    {% else %}
                        <a href="{% url 'login' %}" class="btn btn-link">Login</a>
                        <span class="text-muted mx-1" style="font-size: 1.2rem;">|</span>
                        <a href="{% url 'signUp' %}" class="btn btn-link">Sign Up</a>
                    {% endif %}
                </div>
            </nav>
            
            <hr> 
        </div>

        <div class="content-area text-left">
            {% block body %}
            {% endblock %}
        </div>
        
    </div>

</body>
</html>
